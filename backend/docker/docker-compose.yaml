services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    ports:
      - 5433:5432
    volumes:
      - pg_data:/var/lib/postgresql
      - ./../migrations/:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: abce
      POSTGRES_USER: venueboard_user
      POSTGRES_DB: venueboard

volumes:
  pg_data:
    name: "wap201_pg_data"
